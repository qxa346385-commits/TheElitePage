<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحة النخبة - The Elite Page</title>
    <style>
        body { font-family: sans-serif; background: #1A1A1A; color: #FFF; text-align: center; margin: 0; padding: 0; }
        
        .header { background: #2F4F4F; padding: 20px 0; border-bottom: 5px solid #DAA520; width: 100%; box-sizing: border-box; }
        h1 { font-size: 2.5em; color: #DAA520; margin: 0; }
        
        /* تنسيق جملة التواصل الجديدة */
        .contact { margin-top: 10px; font-size: 0.9em; color: #EEE; }
        .contact a { color: #DAA520; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; font-weight: bold; }
        .fb-icon { width: 22px; height: 22px; vertical-align: middle; }

        #pixelCanvas { cursor: pointer; display: block; margin: 20px auto; border: 1px solid #444; background: #333; max-width: 95%; }
    </style>
</head>
<body>
    <div class="header">
        <h1>THE ELITE PAGE</h1>
        <div class="contact">
            <a href="https://www.facebook.com/profile.php?id=61587773337715" target="_blank">
                للحجز تواصل معنا 
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/51/Facebook_f_logo_%282019%29.svg" class="fb-icon" alt="FB">
            </a>
        </div>
    </div>
    <canvas id="pixelCanvas"></canvas>

    <script>
        const canvas = document.getElementById('pixelCanvas');
        const ctx = canvas.getContext('2d');
        const pixelSize = 10;
        const cols = 1000;
        const rows = 1000;
        canvas.width = cols * pixelSize;
        canvas.height = rows * pixelSize;

        // رسم الشبكة
        ctx.fillStyle = "#333";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = "#444";
        ctx.lineWidth = 0.5;
        for (let i = 0; i <= canvas.width; i += pixelSize) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
        }
        for (let i = 0; i <= canvas.height; i += pixelSize) {
            ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
        }

        // التنبيه عند الضغط
        canvas.addEventListener('click', function(e) {
            const rect = canvas.getBoundingClientRect();
            const x = Math.floor((e.clientX - rect.left) / (canvas.clientWidth / cols));
            const y = Math.floor((e.clientY - rect.top) / (canvas.clientHeight / rows));
            const pixelId = (y * cols) + x + 1;
            alert("أنت اخترت البكسل رقم: " + pixelId + "\n\nاحجز مكانك في النخبة الآن!");
        });
    </script>
</body>
</html>
