<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>صفحة النخبة - The Elite Page</title>
    <style>
        body { font-family: sans-serif; background: #1A1A1A; color: #FFF; text-align: center; margin: 0; }
        .header { background: #2F4F4F; padding: 20px; border-bottom: 3px solid #DAA520; }
        canvas { display: block; margin: 20px auto; border: 1px solid #444; background: #333; }
    </style>
</head>
<body>
    <div class="header">
        <h1>THE ELITE PAGE</h1>
        <a href="https://www.facebook.com/profile.php?id=61587773337715" target="_blank" style="color:#DAA520;">تواصل معنا عبر فيسبوك</a>
    </div>
    <canvas id="pixelCanvas"></canvas>
    <script>
        const canvas = document.getElementById('pixelCanvas');
        const ctx = canvas.getContext('2d');
        const pixelSize = 20;
        canvas.width = 800; canvas.height = 800;
        ctx.fillStyle = "#333";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = "#444";
        for (let i = 0; i < canvas.width; i += pixelSize) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
        }
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = Math.floor((e.clientX - rect.left) / pixelSize);
            const y = Math.floor((e.clientY - rect.top) / pixelSize);
            alert("رقم البكسل: " + ((y * 40) + x + 1) + " - احجز مكانك في النخبة");
        });
    </script>
</body>
</html>
