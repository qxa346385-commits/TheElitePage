<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>صفحة النخبة - The Elite Page</title>
    <style>
        body { font-family: sans-serif; background: #1A1A1A; color: #FFF; text-align: center; margin: 0; }
        .header { background: #2F4F4F; padding: 30px; border-bottom: 5px solid #DAA520; }
        h1 { font-size: 3em; color: #DAA520; margin: 0; }
        .contact { margin: 20px 0; font-size: 1.5em; }
        .contact a { color: #DAA520; text-decoration: none; }
        
        /* تصميم الشبكة */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(10px, 1fr)); gap: 1px; margin: 20px auto; max-width: 1200px; }
        .pixel { width: 10px; height: 10px; background: #333; }
        .pixel img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>
    <div class="header">
        <h1>THE ELITE PAGE</h1>
        <h2>صفحة النخبة</h2>
        <div class="contact">
            <a href="https://www.facebook.com/profile.php?id=61587773337715" target="_blank">تواصل معنا عبر فيسبوك</a>
        </div>
    </div>

    <div class="grid" id="grid"></div>

    <script>
        const grid = document.getElementById('grid');
        // بناء المليون بكسل
        for (let i = 1; i <= 1000000; i++) {
            const div = document.createElement('div');
            div.className = 'pixel';
            // ربط أوتوماتيكي بالصور في مجلد images
            div.innerHTML = `<img src="images/${i}.jpg" onerror="this.style.display='none'">`;
            grid.appendChild(div);
        }
    </script>
</body>
</html>
